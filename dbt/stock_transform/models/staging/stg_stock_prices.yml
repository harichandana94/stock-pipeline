version: 2

models:
  - name: stg_stock_prices
    description: "Cleaned and typed stock prices from Polygon.io"
    columns:
      - name: ticker
        description: "Stock ticker symbol"
        tests:
          - not_null
      - name: trade_date
        description: "Date of the trading day"
        tests:
          - not_null
      - name: close_price
        description: "Closing price of the stock"
        tests:
          - not_null